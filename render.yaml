services:
  - type: web
    name: niilo-portfolio
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    branch: main
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: CONTACT_TO_EMAIL
        sync: false
